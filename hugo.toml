baseURL = "https://blog.183112.xyz"
languageCode = "zh-cn"
title = "我的个人博客"
theme = "PaperMod"

[params]
    defaultTheme = "auto"
    # 显示阅读时间
    showReadingTime = true
    # 显示面包屑导航
    ShowBreadCrumbs = true
    # 允许在文章页显示目录
    ShowToc = true
    
    [params.homeInfoParams]
        Title = "👋 欢迎来到我的博客"
        Content = "这是我使用 Hugo + Debian 13 搭建的第一个站点。"

[[menu.main]]
    name = "归档"
    url = "/archives"
    weight = 10
[[menu.main]]
    name = "搜索"
    url = "/search"
    weight = 20
