baseURL = "https://blog.183112.xyz"
title = "孤岛"
theme = "PaperMod"
defaultContentLanguage = "zh"

[languages]
    [languages.zh]
        languageName = "中文"
        title = "孤岛"
        weight = 1
        [languages.zh.params.homeInfoParams]
            Title = "欢迎来到我的世界"
            Content = "We only live once, and we could go at any time."
        [[languages.zh.menu.main]]
            name = "归档"
            url = "/archives"
            weight = 10
        [[languages.zh.menu.main]]
            name = "搜索"
            url = "/search"
            weight = 20

    [languages.en]
        languageName = "English"
        title = "Isolated Island"
        weight = 2
        [languages.en.params.homeInfoParams]
            Title = "Welcome To My World"
            Content = "We only live once, and we could go at any time."
        [[languages.en.menu.main]]
            name = "Archive"
            url = "/en/archives"
            weight = 10
        [[languages.en.menu.main]]
            name = "Search"
            url = "/en/search"
            weight = 20

[params]
    defaultTheme = "auto"
    showReadingTime = true
    ShowBreadCrumbs = true
    ShowCodeCopyButtons = true
    
    [params.assets]
        favicon = "/favicon.ico"

    [params.label]
        text = "孤岛"
        icon = "/images/debian-logo.svg"
        iconHeight = 35

[outputs]
    home = ["HTML", "RSS", "JSON"]
