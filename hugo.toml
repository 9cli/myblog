baseURL = 'https://blog.183112.xyz/'
languageCode = 'zh-cn'
title = 'Blog'
theme = 'PaperMod'

# 开启搜索需要的 JSON 输出
[outputs]
    home = ["HTML", "RSS", "JSON"]

[params]
    env = 'production'
    title = 'Blog'
    author = '9cli'
    
    # 恢复：显示亮暗切换按钮
    defaultTheme = "light"
    displayFullContent = false
    ShowReadingTime = true
    ShowCodeCopyButtons = true

    # 关键修复：关闭 profileMode 以显示文章列表
    [params.profileMode]
        enabled = false

    # 关键修复：使用 homeInfoParams 在首页顶部显示“记录日常”
    [params.homeInfoParams]
        Title = "记录日常"
        Content = "We only live once, and we could go at any time."

# 菜单配置：确保路径是绝对路径，避免跳转到 GitHub 地址
[menu]
    [[menu.main]]
        identifier = 'archives'
        name = '归档'
        url = '/archives'
        weight = 10
    [[menu.main]]
        identifier = 'search'
        name = '搜索'
        url = '/search'
        weight = 20
    [[menu.main]]
        identifier = 'tags'
        name = '标签'
        url = '/tags'
        weight = 30
[markup.goldmark.renderer]
  unsafe = true
